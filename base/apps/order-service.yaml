---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 122610497964.dkr.ecr.eu-west-1.amazonaws.com/shopflow/order-service:33f9364
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:postgres@postgres:5432/orders_db"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8005"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8002"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8001"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
spec:
  selector:
    app: order-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
