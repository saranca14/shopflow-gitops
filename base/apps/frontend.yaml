---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/shopflow/frontend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8001"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8002"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8003"
            - name: USER_SERVICE_URL
              value: "http://user-service:8004"
            - name: SECRET_KEY
              value: "change-this-in-production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ecommerce
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
