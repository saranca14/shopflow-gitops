apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce

resources:
  - ../../base/apps
  - ../../base/datastores
  - namespace.yaml

patches:
  - target:
      kind: Service
      name: frontend
      namespace: ecommerce
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
