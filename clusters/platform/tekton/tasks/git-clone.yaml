# Install Tekton Pipelines and Triggers on the platform cluster:
#   kubectl apply -f https://storage.googleapis.com/tekton-releases/pipeline/latest/release.yaml
#   kubectl apply -f https://storage.googleapis.com/tekton-releases/triggers/latest/release.yaml
#   kubectl apply -f https://storage.googleapis.com/tekton-releases/triggers/latest/interceptors.yaml
#
# Then apply these custom tasks and pipelines.
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-builds
spec:
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:2.43.0
      script: |
        # Remove any stale git locks from previous failed/interrupted runs
        rm -f $(workspaces.source.path)/source/.git/index.lock

        if [ -d "$(workspaces.source.path)/source/.git" ]; then
          echo "Repository already exists, updating..."
          cd $(workspaces.source.path)/source
          git fetch
          git checkout $(params.revision)
          git pull origin $(params.revision)
        else
          echo "Fresh clone..."
          rm -rf $(workspaces.source.path)/source
          git clone $(params.repo-url) $(workspaces.source.path)/source
          cd $(workspaces.source.path)/source
          git checkout $(params.revision)
        fi
        echo "Cloned/Updated $(params.repo-url) at $(params.revision)"
