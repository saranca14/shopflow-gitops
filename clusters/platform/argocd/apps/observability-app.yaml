---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/shopflow-gitops.git
    targetRevision: main
    path: clusters/observability
    directory:
      recurse: true
  destination:
    name: observability  # Registered cluster name in ArgoCD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
