apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tools
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saranca14/shopflow-gitops.git
    targetRevision: main
    path: clusters/platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
