# App-of-Apps pattern: one ArgoCD Application manages all app cluster apps
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saranca14/shopflow-gitops.git
    targetRevision: main
    path: clusters/app
  destination:
    server: https://2B05FB8142A39C518AC13F42AB54050F.gr7.eu-west-1.eks.amazonaws.com
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
